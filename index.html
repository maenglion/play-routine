/* ═══ Google Sheet Live Sync (운영 시트) ═══ */
const SHEET_ID="1ucLwo5RfIvYoQDCOGzHZsdl5hr9JqigAZnseiuvn2Jw";
const SHEET_PUB="2PACX-1vTKjhomMKQaHmCI9hcy_XcoG1tQuiaPLCSjqQhCS5T8VKGWAEOzhnR6rvImUGn_FTyGD_0AxIiYhhzq";

  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1620806383`
];

  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%EB%8C%80%EC%8B%9C%EB%B3%B4%EB%93%9C`,

/* ═══ 정의층 시트 fetch (온톨로지 자동 도출, v2.2) ═══ */
/* 6개 정의층 시트의 publish URL (gid는 시트별로 다름).
   fetch 결과는 ONTOLOGY 전역에 캐싱. fetch 실패해도 하드코딩 RW/PN으로 자동 fallback. */
let sheetLoaded=false;
let specialBonus=0;
const ONTOLOGY_PUB="2PACX-1vT4Q0Ypn6oL3AqsKtMGPeabDPzOupDsb8YxayMnKng5zwcgT6Yz23U5WrUO24EZjb86PkStf7tc4hLT";
const ONTOLOGY_URLS={
  "01_node_types":       `https://docs.google.com/spreadsheets/d/e/${ONTOLOGY_PUB}/pub?gid=1385231187&single=true&output=csv`,
  "02_relation_types":   `https://docs.google.com/spreadsheets/d/e/${ONTOLOGY_PUB}/pub?gid=1772495407&single=true&output=csv`,
  "03_nodes":            `https://docs.google.com/spreadsheets/d/e/${ONTOLOGY_PUB}/pub?gid=2079410121&single=true&output=csv`,
  "04_edges":            `https://docs.google.com/spreadsheets/d/e/${ONTOLOGY_PUB}/pub?gid=1441156318&single=true&output=csv`,

};

let ontologyLoaded=false;

/* CSV → 객체 배열 (헤더 첫 줄 기반) */
function csvToObjects(csv){
  const rows=csv.split(/\r?\n/).map(r=>{
    const cols=[];let cur="",inQ=false;
    for(let i=0;i<r.length;i++){const c=r[i];
      if(c==='"'){if(inQ&&r[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
      else if(c===","&&!inQ){cols.push(cur);cur=""}
      else cur+=c}
    cols.push(cur);return cols;
  });
  if(rows.length<1)return[];
  const headers=rows[0].map(h=>String(h).trim());
  const out=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(r.length===1&&!r[0])continue; // 빈 줄 스킵
    const obj={};let allEmpty=true;
    for(let j=0;j<headers.length;j++){
      const v=(r[j]||"").trim();obj[headers[j]]=v;
      if(v!=="")allEmpty=false;
    }
    if(!allEmpty)out.push(obj);
  }
  return out;
}

/* 6 시트 병렬 fetch + 파싱 */
async function loadOntology(){
  const tasks=Object.keys(ONTOLOGY_URLS).map(key=>
    fetch(ONTOLOGY_URLS[key])
      .then(r=>{if(!r.ok)throw new Error(r.status);return r.text()})
      .then(csv=>{ONTOLOGY[key]=csvToObjects(csv);return{key,count:ONTOLOGY[key].length,ok:true}})
      .catch(e=>({key,ok:false,err:String(e)}))
  );
  const results=await Promise.all(tasks);
  const okCount=results.filter(r=>r.ok).length;
  console.log(`[ontology] ${okCount}/8 시트 fetch 성공`);
  results.forEach(r=>{
    if(r.ok)console.log(`  ✓ ${r.key}: ${r.count}행`);
    else console.warn(`  ✗ ${r.key}: ${r.err}`);
  });
  if(okCount>=6){  // 정의층 6개만 있어도 정상 동작
    ontologyLoaded=true;
    window.ONTOLOGY=ONTOLOGY;
    R();
  }
}

function parseCSV(csv){
    const rows=csv.split("\n").map(r=>{
      const cols=[];let cur="",inQ=false;
      for(let i=0;i<r.length;i++){const c=r[i];if(c==='"')inQ=!inQ;else if(c===","&&!inQ){cols.push(cur.trim());cur=""}else cur+=c}
      cols.push(cur.trim());return cols});
    let updated=false;
    rows.forEach(cols=>{
      if(!cols[0]||!cols[0].match(/^\d{2}\/\d{2}$/))return;

  const q = getPendingQueue();

/* Web App POST — 단일 payload */
async function postToWebApp(payload){
  if(!WEB_APP_URL || WEB_APP_URL.indexOf("PASTE_YOUR")===0){
    console.warn("[sync] WEB_APP_URL not configured, queueing", payload);
    enqueuePending(payload);
    setSyncStatus("error", "URL 미설정");
    return {ok:false, error:"web_app_url_not_set"};
  }
  try{
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      // CORS — Apps Script Web App은 GET/POST 둘 다 응답 가능
      // 'no-cors'로 두면 응답을 읽지 못함. Apps Script는 simple request 받음.
      // Content-Type을 text/plain으로 보내 preflight 회피.
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(payload),
      redirect: "follow"
    });
    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }
    const data = await res.json();
    console.log("[sync] ok:", data);
    return data;
  } catch(err){
    console.error("[sync] failed:", err);
    enqueuePending(payload);
    throw err;
  }
}

/* 재시도 — pending queue 전부 다시 전송 */
async function retryPending(){
  const q = getPendingQueue();
  if(q.length===0){ toast("재시도할 항목 없음"); return; }
  toast("재시도 시작: " + q.length + "건");
  setSyncStatus("saving");
  const remaining = [];
  let ok = 0, fail = 0;
  for(const p of q){
    try{
      const res = await postToWebApp(p);
      if(res && res.ok) ok++;
      else { remaining.push(p); fail++; }
    } catch(e){
      remaining.push(p); fail++;
    }
  }
  setPendingQueue(remaining);
  if(fail===0){ setSyncStatus("saved"); toast("재시도 완료: "+ok+"건 성공"); }
  else { setSyncStatus("error", fail+"건 실패"); toast("재시도: 성공 "+ok+" / 실패 "+fail); }
}

  );

  // 1) 사용가능시간(net): effective_date <= logicalToday 인 행 누적
  // logicalTodayYMD()는 22시 이후 +1일 (다음날). 22시 cron 이후 R01 등 pending 행 자동 산입.
  let net=0, cash=0, used=0;
  const usageItems=[];
  const rewardItems=[], penaltyItems=[];
  allLedger.forEach(r=>{
    const min=Number(r.amount_minutes)||0;
    const cashAmt=Number(r.cash_amount)||0;
    const eff=String(r.effective_date).slice(0,10);
    const tx=r.transaction_type;
    // net 누적은 effective_date 도래분만 (22시 cutoff 반영)
    if(eff<=logicalToday){
      net+=min; cash+=cashAmt;
    }
    // 리스트는 전체 보존 (전체 누적 sub-view에서 사용)
    if(tx==="reward")          rewardItems.push(r);
    else if(tx==="penalty"||tx==="forfeit_all") penaltyItems.push(r);
    else if(tx==="usage"){ usageItems.push(r); if(eff<=logicalToday) used+=Math.abs(min); }
  });

  // 2) 상단 카드 숫자: logical_date 기준 transaction_date만
  let tr_today=0, tm_today=0, tp_today=0;
  allLedger.forEach(r=>{
    const txDate=String(r.transaction_date).slice(0,10);
    if(txDate!==logicalToday) return;
    const min=Number(r.amount_minutes)||0;
    const cashAmt=Number(r.cash_amount)||0;
    const tx=r.transaction_type;
    if(tx==="reward"){ tr_today+=min; tm_today+=cashAmt; }
    else if(tx==="penalty"||tx==="forfeit_all"){ tp_today+=Math.abs(min); }
  });

  // 3) 이행률 (v3.0: 월별 누적일이 분모)
  const cp={}; RW.filter(r=>r.r).forEach(r=>cp[r.f]={d:0,t:0});
  const now=new Date();
  const curM=now.getMonth()+1, curD=now.getDate();
  for(let day=1; day<=curD; day++){
    const k=curM+"-"+day;
    const dd=st.d[k]||{};
    RW.forEach(r=>{
      if(r.r&&cp[r.f]){
        cp[r.f].t++;
        if(dd[r.f]==="O")cp[r.f].d++;
      }
    });
  }

  // 4) 3일 보너스
  const auto=computeAutoStreak();
  const effectiveStreakCount=(streakMode==="manual")?st.sk.t:auto.autoBonusCount;

  return{
    net, cash,
    tr: tr_today,   // 카드 숫자 — 오늘 발생 분 (22시 리셋)
    tm: tm_today,
    tp: tp_today,
    used,
    cp, auto, effectiveStreakCount,
    rewardItems, penaltyItems, usageItems,  // 누적 리스트 (sub-view용, 전체)
    ledgerReady: allLedger.length>0,
    logicalToday  // 디버그용
  };
}

function tg(k,f){
  if(VIEW)return;

  // v3.4 — 자동 패널티는 클릭 불가 (안전망. UI에서도 disabled 처리)
  if(AUTO_PENALTIES.includes(f)){
    toast("자동 계산 패널티는 룰엔진이 처리해요");
    return;
  }

  // 1. localStorage 즉시 반영 (UI 빠른 반응)
  const dd=st.d[k]||{};
  const prev=dd[f];
  dd[f]=prev==="O"?"X":prev==="X"?undefined:"O";
  if(!dd[f])delete dd[f];
  st.d[k]=dd;
  sv("d",st.d);
  R();

  const newVal = dd[f];

  // v3.5 — MANUAL_PENALTIES 분기
  // O = 패널티 발생. 11번 ledger에 penalty 행 직접 추가.
  // X 또는 undefined = 발생 안 함 (시트엔 영향 없음, append-only 원칙).
  // v3.5 변경: FIELD_TO_RULE_MAP이 객체 {rule_id, condition_id} 형태로 변경.
  //   같은 effect 룰(예: 옷·이물질 둘 다 RULE_P01)을 condition_id로 구분.
  if(MANUAL_PENALTIES.includes(f)){
    if(newVal !== "O"){
      toast("기록 해제됨 (이미 박힌 ledger는 시트에서 직접 정리)");
      return;
    }
    const mapping = FIELD_TO_RULE_MAP[f];
    if(!mapping){
      toast("매핑 없음 (개발자에게 문의)");
      return;
    }
    const ruleId = mapping.rule_id;
    const conditionId = mapping.condition_id;
    // P10 거짓말 = forfeit_all (잔액 전액 몰수)
    const isLie = (ruleId === "RULE_P10");
    const pn = PN.find(p => p.f === f);
    const amountMin = isLie ? 0 : (pn ? Number(pn.t) || 0 : 0);

    const ymd = dateKeyToYMD(k);
    const payload = {
      client_event_id: makeClientEventId("PENALTY", ymd, conditionId),  // condition_id 기반 (같은 rule도 다른 condition은 다른 event)
      child_id: CHILD_ID,
      date: ymd,
      log_type: "penalty_manual",
      rule_id: ruleId,
      condition_id: conditionId,
      effect_type: isLie ? "penalty_all" : "penalty_time",
      amount_minutes: amountMin,
      actor: "parent",
      memo: (pn ? pn.n : ruleId) + " (수동 입력)",
      created_at: new Date().toISOString()
    };
    syncPayload(payload);
    return;
  }

  // 2. 활동(RW) — task_log 동기화
  if(newVal !== "O" && newVal !== "X"){
    toast("기록 해제됨 (시트엔 영향 없음)");
    return;
  }
  const task_id = buildTaskId(k, f);
  if(!task_id){
    toast("💾 저장됨 (로컬)");
    return;
  }
  const ymd = dateKeyToYMD(k);
  const payload = {
    client_event_id: makeClientEventId("TASK", ymd, task_id),
    child_id: CHILD_ID,
    date: ymd,
    log_type: "task",
    task_id: task_id,
    value: newVal,
    actor: "parent",
    created_at: new Date().toISOString()
  };

  // 3. Fire-and-forget 백그라운드 POST
  syncPayload(payload);
}

function saveDailyState(dateKey, state){
  if(VIEW)return;

  const dd = st.d[dateKey] || {};

  st.d[dateKey] = dd;
  sv("d", st.d);

  const ymd = dateKeyToYMD(dateKey);

    client_event_id: makeClientEventId("STATE", ymd, "STATE"),
    child_id: CHILD_ID,
    date: ymd,
    log_type: "daily_state",
    actor: "parent",
    created_at: new Date().toISOString()
  };
  // 정의된 값만 포함 (부분 업데이트)
  if(state.am_med_taken !== undefined)      payload.am_med_taken = state.am_med_taken;
  if(state.pm_med_taken !== undefined)      payload.pm_med_taken = state.pm_med_taken;
  if(state.fatigue_level !== undefined)     payload.fatigue_level = state.fatigue_level;
  if(state.irritability_level !== undefined)payload.irritability_level = state.irritability_level;
  if(state.anxiety_level !== undefined)     payload.anxiety_level = state.anxiety_level;
  if(state.notes !== undefined)             payload.notes = state.notes;

  syncPayload(payload);
}

    r.child_id==="CHILD_MINHOO" && String(r.transaction_date).slice(0,10)===_yvd
  );
  // rule_id → ledger row 매핑 (이미 시트에 박혔는지 확인용)
  const ledgerByRule = {};
  todayLedgerRows.forEach(r => { ledgerByRule[r.source_id] = r; });
  const lieRow = ledgerByRule["RULE_P10"];

  let ph=PN.map(q=>{
    const mapping = FIELD_TO_RULE_MAP[q.f];
    const ruleId = mapping ? mapping.rule_id : null;
    const conditionId = mapping ? mapping.condition_id : null;

    // LIE (P10) — manual but special UI (전액몰수)
    if(q.t===LIE_SENTINEL){
      const occurred = !!lieRow;
      const wipeAmt = occurred ? Math.abs(Number(lieRow.amount_minutes)||0) : 0;
      const bg = occurred ? "#E8836B" : "#fff";
      const fg = occurred ? "#fff" : "#ccc";
      const mark = occurred ? "!" : "";
      const note = occurred ? `발생 (${wipeAmt}분 몰수)` : "전액몰수 · 누르면 발생";
      return `<button class="ci${VIEW?" disabled":""}" onclick="${VIEW?"":"tg('"+s.vd+"','"+q.f+"')"}"><span class="cb" style="background:${bg};color:${fg};border:1.5px solid ${occurred?"#E8836B":"#FFCDD2"}">${mark}</span><span style="flex:1;font-size:13px;font-weight:500">${q.n}</span><span style="font-size:11px;font-weight:700;color:#E8836B">${note}</span></button>`;
    }

    // AUTO 패널티 — read-only. ledger 발동 여부 표시
    if(AUTO_PENALTIES.includes(q.f)){
      const row = ledgerByRule[ruleId];
      const occurred = !!row;
      const amt = occurred ? Math.abs(Number(row.amount_minutes)||0) : 0;
      const bg = occurred ? "#FFEBEE" : "#FAFAFA";
      const labelColor = occurred ? "#E8836B" : "#bbb";
      const indicator = occurred ? `-${amt}분 발동` : "미발동";
      return `<div style="display:flex;align-items:center;width:100%;padding:9px 0;border-bottom:1px solid #f8f8f8;gap:8px;opacity:${occurred?1:0.55}">
        <span style="width:26px;height:26px;border-radius:8px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:${occurred?'#E8836B':'#ccc'};flex-shrink:0">${occurred?"⚠":"·"}</span>
        <span style="flex:1;font-size:13px;font-weight:500">${q.n}</span>
        <span style="font-size:9px;background:#F0F4F8;color:#888;padding:2px 6px;border-radius:4px;font-weight:700">자동</span>
        <span style="font-size:11px;font-weight:700;color:${labelColor};min-width:64px;text-align:right">${indicator}</span>
      </div>`;
    }

    // MANUAL 패널티 — 클릭 가능
    return ci(q.n,dd[q.f],0,`${q.t}분`,1,s.vd,q.f);
  }).join("");
  // v3.3 - 아이 상태 입력 카드
  const curState = (dd._state||{});
  const stateCard = VIEW ? "" : `
    <div class="card" style="border-left:4px solid #A77BBF">
      <h3 class="ct" style="color:#A77BBF;border-bottom:2px solid #A77BBF;padding-bottom:6px">🩺 오늘 상태</h3>
      <div style="font-size:11px;color:#aaa;margin:4px 0 8px">약 복용 (9번 시트)</div>
      ${renderMedRow_(s.vd,"am_med_taken","아침약 복용",curState.am_med_taken)}
      ${renderMedRow_(s.vd,"pm_med_taken","저녁약 복용",curState.pm_med_taken)}
      <div style="font-size:11px;color:#aaa;margin:12px 0 8px">상태 평가 (10번 시트) · 0~10</div>
      ${renderLevelRow_(s.vd,"fatigue_level","피로도",curState.fatigue_level)}
      ${renderLevelRow_(s.vd,"irritability_level","예민도",curState.irritability_level)}
      ${renderLevelRow_(s.vd,"anxiety_level","불안도",curState.anxiety_level)}
      <div style="padding:8px 0">
        <div style="font-size:12px;font-weight:600;color:#666;margin-bottom:4px">메모</div>
        <textarea id="stateMemo_${s.vd}" style="width:100%;padding:8px;border:1px solid #E4ECF5;border-radius:8px;font-family:Nunito;font-size:12px;resize:vertical;min-height:50px" placeholder="특이사항 메모" onblur="saveStateMemo('${s.vd}',this.value)">${curState.notes||""}</textarea>
      </div>
    </div>`;
  c=`<button class="bb" onclick="st.vd=null;R()">← 목록</button><h2 style="font-weight:900;color:#5A9BBF;margin:0 0 4px">${p[0]}월 ${p[1]}일 (${sc?.dow||""})</h2>${sc?.note?`<span class="badge">${sc.note}</span>`:""}${tl?`<div class="card" style="margin-top:12px"><h3 class="ct" style="color:#5A9BBF;border-bottom:2px solid #7EB6D9;padding-bottom:6px">📘 학습</h3>${tl}</div>`:""}${stateCard}<div class="card"><h3 class="ct" style="color:#6FA88F;border-bottom:2px solid #8FBF9F;padding-bottom:6px">📝 오늘 활동</h3>${rh}${VIEW?"":`<div style="display:flex;align-items:center;gap:8px;padding:8px 0"><span style="font-size:13px;font-weight:600">응용심화 점수</span><input type="number" class="si" value="${dd.as??""}" onchange="ss('${s.vd}',this.value?+this.value:undefined)" placeholder="점수"></div>`}</div><div class="card"><h3 class="ct" style="color:#E8836B;border-bottom:2px solid #E8836B;padding-bottom:6px">❌ 패널티</h3><p style="font-size:11px;color:#999;margin:0 0 8px">발생한 항목만 클릭하세요 · 잔액에서 즉시 차감</p>${ph}</div>`}else{
    /* ═══ 캘린더 — 월별 일반화 + 좌우 화살표 (v3.0) ═══ */
    const cy=s.calYear, cmm=s.calMonth;
    const daysInMonth=monthDays(cy,cmm);
    const leading=calendarLeadingBlanks(cy,cmm);
    let cl="";
    for(let d=1;d<=daysInMonth;d++){
      const k=cmm+"-"+d;
      const dd=s.d[k]||{};
      const ck=Object.values(dd).filter(v=>v==="O").length;
      const sc=SC[k];
      const we=sc?.dow==="토"||sc?.dow==="일";
      const it=tm===cmm&&td===d&&ty===cy;
      cl+=`<button class="cc${it?" td":we?" we":""}" onclick="st.vd='${k}';R()"><span style="font-weight:900;font-size:13px">${d}</span>${ck>0?`<span style="font-size:8px;background:${it?"rgba(255,255,255,.3)":"#D5F5E3"};color:${it?"#fff":"#6FA88F"};border-radius:4px;padding:0 3px">${ck}✓</span>`:""}</button>`;
    }
    const blanksHTML='<div></div>'.repeat(leading);
    const isCurMonth=(cy===ty && cmm===tm);
    const todayHint=isCurMonth?` <span style="font-size:13px;color:#aaa;font-weight:600">(${tm}월 ${td}일)</span>`:"";
    c=`<div style="display:flex;align-items:center;justify-content:space-between;margin:0 0 14px"><button onclick="changeMonth(-1)" style="background:none;border:none;font-size:22px;color:#7EB6D9;cursor:pointer;padding:4px 18px;font-family:Nunito;font-weight:900">‹</button><h2 style="font-weight:900;color:#5A9BBF;margin:0;font-size:18px">${cmm}월${todayHint}</h2><button onclick="changeMonth(1)" style="background:none;border:none;font-size:22px;color:#7EB6D9;cursor:pointer;padding:4px 18px;font-family:Nunito;font-weight:900">›</button></div><div class="cg">${["일","월","화","수","목","금","토"].map(d=>`<div class="ch">${d}</div>`).join("")}${blanksHTML}${cl}</div>`}}

else if(s.tab==="rules"){const sec=[{id:"rw",ti:"✅ 리워드",cl:"#8FBF9F",it:RW.map(r=>`<div class="rr"><span style="flex:1;font-size:13px;font-weight:500">${r.n}</span><span style="font-size:12px;font-weight:700;color:#8FBF9F">+${r.t||""}${r.m?r.m.toLocaleString()+"원":r.t?"분":""}</span>${r.r?'<span class="rb">필수</span>':""}</div>`).join("")},{id:"pn",ti:"❌ 패널티",cl:"#E8836B",it:PN.map(p=>`<div class="rr"><span style="flex:1;font-size:13px;font-weight:500">${p.n}</span><span style="font-size:12px;font-weight:700;color:#E8836B">${p.t===LIE_SENTINEL?"전액몰수":p.t+"분"}</span></div>`).join("")},{id:"df",ti:"📖 기준 정의",cl:"#5A9BBF",it:[{t:"🏠 방정리",i:["빨래/옷 바닥·책상에 없을 것","책상은 연필통 외 없는 상태","양말/옷 뒤집어 벗기 금지"]},{t:"📝 채점",i:["풀이과정 미작성 50%","단위 미작성 오답","화풀이 0점+패널티"]},{t:"🎫 쿠폰",i:["당일 사용 불가","패널티 많으면 선차감","3일보너스 후 다시 3일"]},{t:"📖 독서 토론",i:["토/일 1시간씩","미인지 토론 불인정","일요일 농구 후"]}].map(d=>`<div><p style="font-weight:700;font-size:13px;margin:0 0 4px">${d.t}</p>${d.i.map(x=>`<p style="font-size:12px;color:#888;margin:2px 0 2px 12px">• ${x}</p>`).join("")}</div>`).join("")}];c=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="font-weight:900;color:#5A9BBF;margin:0">📖 규칙표</h2><span class="badge">VER 2.1</span></div>${sec.map(x=>`<button class="acc" style="border-left:4px solid ${x.cl}" onclick="st.or=st.or==='${x.id}'?null:'${x.id}';R()"><span>${x.ti}</span><span style="display:inline-block;transform:${s.or===x.id?"rotate(180deg)":""}">▾</span></button>${s.or===x.id?`<div class="ab">${x.it}</div>`:""}`).join("")}`}

a.innerHTML=`
  ${VIEW?'<div class="view-banner">👀 보기 모드</div>':""}
  <header><div class="h-top">
    <div class="h-left">${VIEW?LG(36):`<a href="${SHEET_EDIT}" target="_blank" style="text-decoration:none">${LG(36)}</a>`}<div><div class="h-name">민후</div><div class="h-date">${tm}월 ${td}일 ${dw}요일</div></div></div>
    <div class="h-btns">
      <span id="syncBadge" style="font-size:10px;font-weight:700;padding:4px 8px;border-radius:8px;margin-right:4px"></span>
      ${VIEW?"":`<button class="h-btn" onclick="retryPending()" title="동기화 재시도" id="retryBtn" style="position:relative">🔄${getPendingQueue().length>0?`<span style="position:absolute;top:-2px;right:-2px;background:#E8836B;color:#fff;font-size:9px;border-radius:8px;padding:1px 5px;font-weight:800">${getPendingQueue().length}</span>`:""}</button>`}
      ${VIEW?"":`<button class="h-btn" onclick="doShare()" title="공유">🔗</button>`}
      <button class="h-btn" onclick="st.ph='splash';R()">🔒</button>
    </div>
  </div></header>
  <nav>${tabs.map(t=>`<button class="${s.tab===t.id?"on":""}" onclick="st.tab='${t.id}';st.vd=null;st.dashView='main';R()"><span class="lb">${t.lb}</span></button>`).join("")}</nav>
  <main class="fade-in">${c}</main>`}
R();
</script>
</body>
</html>
