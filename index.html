<!DOCTYPE html>
<html lang="ko">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#F7FBFE 0%,#F0F7F4 50%,#FFFDF5 100%);min-height:100vh}.app{max-width:460px;margin:0 auto;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
.splash-bg{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#E8F4F8,#E8F5E9,#FFF8E1,#F4ECF7);background-size:400% 400%;animation:gradientShift 6s ease infinite;padding:20px;text-align:center}
.splash-logo{animation:scaleIn .8s cubic-bezier(.34,1.56,.64,1) .2s both}
.splash-name{font-weight:900;font-size:32px;color:#5A9BBF;margin:16px 0 4px;animation:fadeUp .6s ease .6s both}
.splash-age{font-size:14px;color:#8FBF9F;font-weight:700;animation:fadeUp .6s ease .8s both}
.splash-div{width:60px;height:3px;background:linear-gradient(90deg,#7EB6D9,#8FBF9F);border-radius:2px;margin:16px 0;animation:slideRight .6s ease 1s both}
.splash-tag{font-size:15px;color:#A77BBF;font-weight:700;margin:0 0 24px;animation:fadeUp .6s ease 1.2s both;line-height:1.6}
.splash-btn{padding:14px 48px;background:linear-gradient(135deg,#7EB6D9,#8FBF9F);color:#fff;border:none;border-radius:16px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito';animation:fadeUp .6s ease 1.4s both;box-shadow:0 4px 20px rgba(126,182,217,.3)}
.splash-btn:active{transform:scale(.96)}
.splash-ver{font-size:10px;color:#bbb;margin-top:16px;animation:fadeUp .6s ease 1.6s both}
.auth-bg{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#E8F4F8,#E8F5E9,#FFF8E1);padding:20px}
.auth-card{background:rgba(255,255,255,.95);border-radius:24px;padding:36px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 40px rgba(126,182,217,.15)}
.auth-card h1{font-weight:900;font-size:24px;color:#5A9BBF;margin:8px 0 4px}
.auth-card p{font-size:13px;color:#aaa;margin:0 0 20px}
.auth-card input{width:100%;padding:12px 14px;border:2px solid #E8F4F8;border-radius:12px;font-size:14px;outline:none;margin-bottom:10px;font-family:'Nunito'}
.auth-card input:focus{border-color:#7EB6D9}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,#7EB6D9,#8FBF9F);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito'}
.error{color:#E8836B;font-size:13px}
header{background:linear-gradient(135deg,#7EB6D9,#8FBF9F);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-radius:0 0 20px 20px}

.lock-btn{background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:6px 10px;cursor:pointer;font-size:16px}

nav button{flex:1;padding:10px 0;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:2px solid transparent;font-family:'Nunito'}
nav button.active{border-bottom-color:#7EB6D9;background:#F7FBFE}
nav .icon{font-size:18px}nav .label{font-size:10px;font-weight:700;color:#888}
main{padding:16px}
.kr{display:flex;gap:8px;margin-bottom:8px}.kpi{flex:1;background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.kl{font-size:10px;color:#999;font-weight:600}.kv{font-weight:900;font-size:18px;display:block;margin:4px 0 0}.ks{font-size:10px;color:#bbb}
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:10px}
.ct{font-weight:800;font-size:14px;color:#5A9BBF;margin:0 0 10px}
.warn{background:#FFF0ED;color:#E8836B;padding:10px 14px;border-radius:12px;font-weight:700;font-size:12px;text-align:center;margin-bottom:8px}
.cr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f8f8f8}
.bar{width:50px;height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}.bf{height:100%;border-radius:3px}
.ci{display:flex;align-items:center;width:100%;padding:9px 0;border:none;border-bottom:1px solid #f8f8f8;background:transparent;cursor:pointer;text-align:left;gap:8px;font-family:'Nunito'}
.cb{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0}
.rb{font-size:8px;background:#E8F4F8;color:#7EB6D9;padding:2px 6px;border-radius:4px;font-weight:800}
.badge{font-size:10px;background:#FFF8E1;color:#D4A843;padding:3px 10px;border-radius:10px;font-weight:700}
.tc{display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:8px}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.ch{text-align:center;font-weight:800;font-size:11px;padding:6px 0;color:#999}
.cc{aspect-ratio:1;border-radius:10px;border:1px solid #f0f0f0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;background:#fff}
.cc:active{transform:scale(.95)}.cc.td{background:#7EB6D9;color:#fff}.cc.we{background:#FFF8E1;color:#D4A843}
.acc{width:100%;padding:12px 14px;background:#fff;border:none;border-radius:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:700;font-size:13px;color:#5A9BBF;box-shadow:0 1px 4px rgba(0,0,0,.04);font-family:'Nunito';margin-bottom:6px}
.ab{background:#fff;border-radius:0 0 12px 12px;padding:10px 14px;margin-top:-10px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.rr{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid #f8f8f8;flex-wrap:wrap}
.wr{display:flex;gap:4px;overflow-x:auto}
.wd{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;border-radius:10px;border:1px solid #f0f0f0;background:#fff;cursor:pointer;min-width:42px;color:#5A9BBF;font-family:'Nunito'}
.wd.ac{background:#7EB6D9;color:#fff}
.mb{width:30px;height:30px;border-radius:50%;border:2px solid #E8F4F8;background:#fff;cursor:pointer;font-weight:800;font-size:15px;color:#7EB6D9;display:flex;align-items:center;justify-content:center}
.si{width:55px;padding:7px 8px;border:2px solid #E8F4F8;border-radius:8px;font-size:13px;text-align:center;font-family:'Nunito'}
select{padding:8px 12px;border-radius:10px;border:2px solid #E8F4F8;font-size:12px;font-weight:700;font-family:'Nunito'}
.bb{background:none;border:none;color:#7EB6D9;font-weight:700;font-size:13px;cursor:pointer;padding:0;margin-bottom:8px;font-family:'Nunito'}
.ml{font-size:11px;background:#E8F4F8;color:#5A9BBF;padding:2px 8px;border-radius:6px;font-weight:700;margin-left:6px}
</style>
</head>
<body>

<script>
const S={"4-28":{dow:"월",tasks:["T2(40min)","T1(60min)","T11(40min)","기탄3장"]},"4-29":{dow:"화",tasks:["T4(40min)","T7(40min)","기탄3장"]},"4-30":{dow:"수",tasks:["T1(40min)","기탄3장"]},"5-1":{dow:"금",tasks:["T2(40min)","T1(100min)","기탄3장"]},"5-2":{dow:"토",tasks:["기탄3장"],note:"아빠집"},"5-3":{dow:"일",tasks:["T10(40min)","T12(60min)","기탄3장"]},"5-4":{dow:"월",tasks:["T3(40min)","T6(40min)","기탄3장"]},"5-5":{dow:"화",tasks:["T10(40min)","T5(40min)","기탄3장"],note:"어린이날"},"5-6":{dow:"수",tasks:["T8(40min)","T10(40min)","기탄3장"]},"5-7":{dow:"목",tasks:["T3(40min)","T7(40min)","T11(40min)","기탄3장"]},"5-8":{dow:"금",tasks:["T4(40min)","T5(40min)","기탄3장"]},"5-9":{dow:"토",tasks:["T2(40min)","T1(60min)","T12(60min)","기탄3장"]},"5-10":{dow:"일",tasks:["T12(60min)","T1(60min)","기탄3장"]},"5-11":{dow:"월",tasks:["T3(40min)","T5(40min)","기탄3장"]},"5-12":{dow:"화",tasks:["T3(40min)","T12(60min)","T11(40min)","기탄3장"]},"5-13":{dow:"수",tasks:["T4(40min)","T1(60min)","기탄3장"]},"5-14":{dow:"목",tasks:["T4(40min)","T11(40min)","T11(40min)","기탄3장"]},"5-15":{dow:"금",tasks:["T3(40min)","T7(40min)","기탄3장"]},"5-16":{dow:"토",tasks:["기탄3장"],note:"아빠집"},"5-17":{dow:"일",tasks:["T12(60min)","기탄3장"]},"5-18":{dow:"월",tasks:["T4(40min)","T1(60min)","기탄3장"]},"5-19":{dow:"화",tasks:["T2(90min)","T5(40min)","T11(40min)","기탄3장"]},"5-20":{dow:"수",tasks:["T3(40min)","T2(60min)","기탄3장"]},"5-21":{dow:"목",tasks:["T3(40min)","T1(60min)","T11(40min)","기탄3장"]},"5-22":{dow:"금",tasks:["T4(40min)","T8(40min)","기탄3장"]},"5-23":{dow:"토",tasks:["T2(60min)","T1(90min)","T12(60min)","기탄3장"]},"5-24":{dow:"일",tasks:["T7(40min)","T5(40min)","T12(60min)","기탄3장"]},"5-25":{dow:"월",tasks:["T4(40min)","T6(40min)","기탄3장"]},"5-26":{dow:"화",tasks:["T3(40min)","T2(40min)","T11(40min)","기탄3장"]},"5-27":{dow:"수",tasks:["T3(40min)","T8(40min)","기탄3장"]},"5-28":{dow:"목",tasks:["T2(40min)","T1(60min)","T11(40min)","기탄3장"]},"5-29":{dow:"금",tasks:["T4(40min)","T7(40min)","기탄3장"]},"5-30":{dow:"토",tasks:["기탄3장"],note:"아빠집"},"5-31":{dow:"일",tasks:["T12(60min)","기탄3장"]}};
const TN={T1:"영재원 과제",T2:"영재원 개념잡기",T3:"디딤돌 라이트",T4:"응용심화수학",T5:"1031 수/연산",T6:"1031 여러가지문제",T7:"1031 규칙/논리",T8:"1031 도형/측정",T9:"기탄수학",T10:"바이올린",T11:"기타 활동",T12:"명심보감"};
const TI={T1:"🧩",T2:"🧩",T3:"📐",T4:"📐",T5:"🔢",T6:"🔢",T7:"🔢",T8:"🔢",T9:"✏️",T10:"🎻",T11:"📌",T12:"📖"};
const RW=[{n:"매일 공부 완료",t:60,r:1,f:"study"},{n:"숙제/유인물 챙기기",t:40,r:1,f:"hw"},{n:"명심보감 토론",t:60,r:0,f:"read"},{n:"학교 수학 100점",t:60,r:0,f:"math"},{n:"응용심화 80점↑",t:90,r:0,f:"adv"},{n:"방정리",t:0,m:5000,r:0,f:"room"},{n:"화장실 청소",t:30,r:0,f:"wc"},{n:"고양이 화장실",t:20,r:0,f:"cat"},{n:"9시반 취침",t:30,r:1,f:"bed"}];
const PN=[{n:"유인물 이틀 지나 발견",t:-30,f:"hwL"},{n:"공부량 미달",t:-80,f:"stF"},{n:"아침약 미복용",t:-180,f:"med"},{n:"밤10시 미취침",t:-90,f:"late"},{n:"토론 준비 미흡",t:-90,f:"rdF"},{n:"거짓말/약속위반",t:-9999,f:"lie"},{n:"학교시간 미준수",t:-30,f:"ltS"}];
const BAL=40;
const LG='<svg width="W" height="W" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="white" opacity=".9"/><path d="M25 75 L25 25 Q25 15 35 15 L45 15 Q60 15 60 30 Q60 45 45 45 L35 45" stroke="#7EB6D9" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M45 45 L45 75" stroke="#7EB6D9" stroke-width="7" fill="none" stroke-linecap="round"/><path d="M50 75 L50 25 Q50 15 60 15 L70 15 Q85 15 85 30 Q85 42 73 44 L85 75" stroke="#8FBF9F" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
function logo(s){return LG.replace(/W/g,s)}
let st={ph:"splash",pin:"",pe:"",tab:"dash",d:{},sk:{c:0,t:0},gl:"pending",vd:null,or:"rw"};
function ld(k,df){try{const v=localStorage.getItem("pr_"+k);return v?JSON.parse(v):df}catch{return df}}
function sv(k,v){try{localStorage.setItem("pr_"+k,JSON.stringify(v))}catch{}}
st.d=ld("d",{});st.sk=ld("sk",{c:0,t:0});st.gl=ld("gl","pending");
function tk(){const d=new Date();return(d.getMonth()+1)+"-"+d.getDate()}
function tm(){return new Date().getMonth()+1}function td(){return new Date().getDate()}
function dw(){return["일","월","화","수","목","금","토"][new Date().getDay()]}
function pt(t){if(t.startsWith("기탄"))return{c:"T9",n:"기탄수학",t:"3장",i:"✏️"};const m=t.match(/^(T\d+)\((.+)\)$/);return m?{c:m[1],n:TN[m[1]]||m[1],t:m[2],i:TI[m[1]]||"📌"}:{c:"",n:t,t:"",i:"📌"}}
function cs(){let tr=0,tp=0,tm=0;const cp={};RW.filter(r=>r.r).forEach(r=>cp[r.f]={d:0,t:0});
Object.keys(st.d).forEach(k=>{const dd=st.d[k];RW.forEach(r=>{if(dd[r.f]==="O"){tr+=r.t||0;tm+=(r.m||0)}if(r.r&&cp[r.f]){if(dd[r.f]==="O"||dd[r.f]==="X")cp[r.f].t++;if(dd[r.f]==="O")cp[r.f].d++}});
const sc=dd.as;if(typeof sc==="number"&&sc>=80)tr+=90;if(typeof sc==="number"&&sc<50)tp+=60;
PN.forEach(p=>{if(dd[p.f]==="O"){if(p.t===-9999)tp=99999;else tp+=Math.abs(p.t)}})});
return{tr:tr+st.sk.t*60,tp,tm,net:tr+st.sk.t*60-tp+BAL,cp}}
function tg(k,f){const dd=st.d[k]||{};const v=dd[f];dd[f]=v==="O"?"X":v==="X"?undefined:"O";if(!dd[f])delete dd[f];st.d[k]=dd;sv("d",st.d);R()}
function ss(k,v){const dd=st.d[k]||{};dd.as=v;st.d[k]=dd;sv("d",st.d);R()}
function ci(l,v,rq,rw,pe,k,f){const bg=v==="O"?"#8FBF9F":v==="X"?"#E8836B":"#F0F0F0";return`<button class="ci" onclick="tg('${k}','${f}')"><span class="cb" style="background:${bg};color:${v?"#fff":"#ddd"}">${v==="O"?"✓":v==="X"?"✗":""}</span><span style="flex:1;font-size:13px;font-weight:500">${l}</span>${rq?'<span class="rb">필수</span>':""}<span style="font-size:11px;font-weight:700;color:${pe?"#E8836B":"#6FA88F"}">${rw}</span></button>`}
function gw(){const days=[];const now=new Date();for(let i=0;i<7;i++){const d=new Date(now);d.setDate(now.getDate()+i);const k=(d.getMonth()+1)+"-"+d.getDate();const s=S[k];days.push({k,dt:d.getDate(),dw:["일","월","화","수","목","금","토"][d.getDay()],s,f:i===0})}return days}

function R(){
const a=document.getElementById("app"),s=st,_tk=tk(),_tm=tm(),_td=td(),_dw=dw();
if(s.ph==="splash"){a.innerHTML=`<div class="splash-bg"><div class="splash-logo">${logo(72)}</div><div class="splash-name">이민후</div><div class="splash-age">만 9세</div><div class="splash-div"></div><div class="splash-tag">잔소리 없이<br>습관 만드는 법</div><button class="splash-btn" onclick="st.ph='login';R()">시작하기 🌱</button><div class="splash-ver">Play Routine v1.0</div></div>`;return}
if(s.ph==="login"){a.innerHTML=`<div class="auth-bg"><div class="auth-card">${logo(48)}<h1>Play Routine</h1><p>민후의 공간이에요</p><input id="pin" type="password" placeholder="비밀번호" autofocus onkeydown="if(event.key==='Enter')doL()"><br>${s.pe?`<p class="error">${s.pe}</p>`:""}<button class="auth-btn" onclick="doL()">들어가기</button></div></div>`;return}
const X=cs();let c="";
if(s.tab==="dash"){
