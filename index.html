// ═══ Google Sheet Live Sync ═══
const SHEET_ID="1ucLwo5RfIvYoQDCOGzHZsdl5hr9JqigAZnseiuvn2Jw";
const SHEET_PUB="2PACX-1vTKjhomMKQaHmCI9hcy_XcoG1tQuiaPLCSjqQhCS5T8VKGWAEOzhnR6rvImUGn_FTyGD_0AxIiYhhzq";
const SHEET_EDIT="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/edit";
const SHEET_URLS=[
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=5%EC%9B%94+%EB%8B%AC%EB%A0%A5`,
  `https://docs.google.com/spreadsheets/d/e/${SHEET_PUB}/pub?gid=1620806383&single=true&output=csv`,
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1620806383`
];
// Dashboard tab URLs for special events
const DASH_URLS=[
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%EB%8C%80%EC%8B%9C%EB%B3%B4%EB%93%9C`,
  `https://docs.google.com/spreadsheets/d/e/${SHEET_PUB}/pub?gid=0&single=true&output=csv`
];
let sheetLoaded=false;
let specialBonus=0; // from sheet special events

async function loadSheet(){
  // Load calendar
  for(const url of SHEET_URLS){
    try{const r=await fetch(url);if(!r.ok)continue;const csv=await r.text();
      if(!csv.includes("04/30")&&!csv.includes("05/01"))continue;
      parseCSV(csv);break}catch(e){continue}}
  // Load dashboard for special events
  for(const url of DASH_URLS){
    try{const r=await fetch(url);if(!r.ok)continue;const csv=await r.text();
      if(!csv.includes("이벤트"))continue;
      parseDashboard(csv);break}catch(e){continue}}
  if(!sheetLoaded)console.log("시트 연동 실패, 하드코딩 사용")}

function parseCSV(csv){
    const rows=csv.split("\n").map(r=>{
      const cols=[];let cur="",inQ=false;
      for(let i=0;i<r.length;i++){const c=r[i];if(c==='"')inQ=!inQ;else if(c===","&&!inQ){cols.push(cur.trim());cur=""}else cur+=c}
      cols.push(cur.trim());return cols});
    let updated=false;
    rows.forEach(cols=>{
      if(!cols[0]||!cols[0].match(/^\d{2}\/\d{2}$/))return;
      const[mm,dd]=cols[0].split("/").map(Number);
      const dow=cols[1]||"";const tasks=[];
      for(let i=2;i<=6;i++)if(cols[i]&&cols[i].trim()&&!cols[i].includes("T1~"))tasks.push(cols[i].trim().replace("T9 기탄 3장","기탄3장"));
      const note=cols[7]||"";const key=mm+"-"+dd;
      SC[key]={dow,tasks,note:note.replace("아빠집 가는 날","아빠집")};updated=true;
    });
    if(updated){sheetLoaded=true;console.log("시트 달력 연동 완료!");R()}}

function parseDashboard(csv){
    // Parse special events: look for rows with "+숫자분" and "제공완료"
    let bonus=0;
    const rows=csv.split("\n");
    rows.forEach(row=>{
      if(row.includes("제공완료")||row.includes("제공 완료")){
        const m=row.match(/\+?(\d+)분/);
        if(m)bonus+=parseInt(m[1]);
      }
    });
    if(bonus>0){specialBonus=bonus;console.log("특별이벤트 +"+bonus+"분 반영!");sv("spBonus",bonus);R()}}

setTimeout(loadSheet,500);
setInterval(loadSheet,300000);

const TN={T1:"영재원 과제",T2:"영재원 개념잡기",T3:"디딤돌 라이트",T4:"응용심화수학",T5:"1031 수/연산",T6:"1031 여러가지문제",T7:"1031 규칙/논리",T8:"1031 도형/측정",T9:"기탄수학",T10:"바이올린",T11:"기타 활동",T12:"명심보감"};
const TI={T1:"🧩",T2:"🧩",T3:"📐",T4:"📐",T5:"🔢",T6:"🔢",T7:"🔢",T8:"🔢",T9:"✏️",T10:"🎻",T11:"📌",T12:"📖"};
const RW=[{n:"매일 공부 완료",t:60,r:1,f:"study"},{n:"숙제/유인물 챙기기",t:40,r:1,f:"hw"},{n:"명심보감 토론",t:60,r:0,f:"read"},{n:"학교 수학 100점",t:60,r:0,f:"math"},{n:"응용심화 80점↑",t:90,r:0,f:"adv"},{n:"방정리",t:0,m:5000,r:0,f:"room"},{n:"화장실 청소",t:30,r:0,f:"wc"},{n:"고양이 화장실",t:20,r:0,f:"cat"},{n:"9시반 취침",t:30,r:1,f:"bed"}];
const PN=[{n:"유인물 이틀 지나 발견",t:-30,f:"hwL"},{n:"공부량 미달",t:-80,f:"stF"},{n:"아침약 미복용",t:-180,f:"med"},{n:"밤10시 미취침",t:-90,f:"late"},{n:"토론 준비 미흡",t:-90,f:"rdF"},{n:"거짓말/약속위반",t:-9999,f:"lie"},{n:"학교시간 미준수",t:-30,f:"ltS"},{n:"저녁약 미복용(8시전)",t:-60,f:"dinM"}];
const BAL=40; // 4월 이월 잔고
const LG=s=>`<img src="icon-512.png" width="${s}" height="${s}" style="border-radius:${Math.round(s*0.22)}px">`;

let st={ph:"splash",tab:"dash",d:{},sk:{c:0,t:0},gl:"pending",vd:null,or:"rw"};
function ld(k,df){try{const v=localStorage.getItem("pr_"+k);return v?JSON.parse(v):df}catch{return df}}
function sv(k,v){try{localStorage.setItem("pr_"+k,JSON.stringify(v))}catch{}}
st.d=ld("d",{});st.sk=ld("sk",{c:0,t:0});st.gl=ld("gl","pending");
st.use=ld("use",[]);
specialBonus=ld("spBonus",0); // cache special bonus locally too

function _tk(){const d=new Date();return(d.getMonth()+1)+"-"+d.getDate()}
function _tm(){return new Date().getMonth()+1}
function _td(){return new Date().getDate()}
function _dw(){return["일","월","화","수","목","금","토"][new Date().getDay()]}
function pt(t){if(t.startsWith("기탄"))return{c:"T9",n:"기탄수학",t:"3장",i:"✏️"};const m=t.match(/^(T\d+)\((.+)\)$/);return m?{c:m[1],n:TN[m[1]]||m[1],t:m[2],i:TI[m[1]]||"📌"}:{c:"",n:t,t:"",i:"📌"}}

function cs(){
  let tr=0,tp=0,tm=0;const cp={};RW.filter(r=>r.r).forEach(r=>cp[r.f]={d:0,t:0});
  Object.keys(st.d).forEach(k=>{const dd=st.d[k];
    RW.forEach(r=>{if(dd[r.f]==="O"){tr+=r.t||0;tm+=(r.m||0)}if(r.r&&cp[r.f]){if(dd[r.f]==="O"||dd[r.f]==="X")cp[r.f].t++;if(dd[r.f]==="O")cp[r.f].d++}});
    const sc=dd.as;if(typeof sc==="number"&&sc>=80)tr+=90;if(typeof sc==="number"&&sc<50)tp+=60;
    PN.forEach(p=>{if(dd[p.f]==="O"){if(p.t===-9999)tp=99999;else tp+=Math.abs(p.t)}})});
  const used=st.use.reduce((a,u)=>a+u.a,0);
  return{tr:tr+st.sk.t*60,tp,tm,net:tr+st.sk.t*60-tp+BAL+specialBonus-used,cp,used}}

function tg(k,f){if(VIEW)return;const dd=st.d[k]||{};const v=dd[f];dd[f]=v==="O"?"X":v==="X"?undefined:"O";if(!dd[f])delete dd[f];st.d[k]=dd;sv("d",st.d);R();toast("💾 저장됨")}
function ss(k,v){if(VIEW)return;const dd=st.d[k]||{};dd.as=v;st.d[k]=dd;sv("d",st.d);R();toast("💾 저장됨")}

// ═══ Cross-device sync via export/import ═══
function doShare(){
  const url=location.origin+location.pathname+"?view=1";
  navigator.clipboard.writeText(url).then(()=>toast("📋 보기전용 링크가 복사되었어요!")).catch(()=>{prompt("이 링크를 복사하세요:",url)})}

function doSync(){
  // Export all localStorage data as a URL-safe string
  const data={d:st.d,sk:st.sk,gl:st.gl,use:st.use};
  const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  const syncUrl=location.origin+location.pathname+"?sync="+encoded;
  navigator.clipboard.writeText(syncUrl).then(()=>toast("📋 동기화 링크 복사! 아이 폰에서 열면 데이터 동기화됩니다")).catch(()=>{prompt("이 링크를 아이 폰에서 열어주세요:",syncUrl)})}

// Check if sync data is in URL
function checkSync(){
  const params=new URLSearchParams(location.search);
  const syncData=params.get("sync");
  if(syncData){
    try{
      const json=JSON.parse(decodeURIComponent(escape(atob(syncData))));
      if(json.d){st.d=json.d;sv("d",st.d)}
      if(json.sk){st.sk=json.sk;sv("sk",st.sk)}
      if(json.gl){st.gl=json.gl;sv("gl",st.gl)}
